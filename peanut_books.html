<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>피넛 북스 🥜</title>
  
  <!-- Tailwind CSS 로드 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* 스크롤바 숨김 처리 */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 도서 카드 인터랙션 애니메이션 */
    .book-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .book-card:hover { transform: translateY(-12px); box-shadow: 0 20px 40px rgba(0,0,0,0.12); }
    .book-card:active { transform: scale(0.95); }
    
    /* 커스텀 애니메이션 */
    @keyframes bounce {
        0%, 100% { transform: translateY(-25%); animation-timing-function: cubic-bezier(0.8,0,1,1); }
        50% { transform: none; animation-timing-function: cubic-bezier(0,0,0.2,1); }
    }
    .animate-bounce { animation: bounce 1s infinite; }
    
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: .7; }
    }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    
    @keyframes zoomIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
    }
    .animate-zoom-in { animation: zoomIn 0.2s ease-out forwards; }
  </style>
</head>
<body class="min-h-screen bg-[#FFFDF7] font-sans text-gray-800 selection:bg-amber-200" onload="initApp()">

  <!-- 헤더 네비게이션 -->
  <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-amber-100 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <div 
        class="flex items-center gap-2 cursor-pointer active:scale-95 transition-transform"
        onclick="goHome()"
      >
        <span class="text-3xl">🐿️</span>
        <h1 class="text-2xl font-black tracking-tighter text-amber-900">
          피넛<span class="text-amber-500">북스</span>
        </h1>
      </div>
      <div class="text-sm font-bold text-amber-700 bg-amber-100 px-3 py-1 rounded-full shadow-inner">
        학생용 도서 검색기 📚
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8 space-y-12">
    
    <!-- 검색 섹션 -->
    <section class="bg-gradient-to-br from-amber-100 to-orange-50 rounded-[2rem] p-6 md:p-10 shadow-lg border border-white">
      <div class="text-center mb-8">
        <h2 class="text-2xl md:text-3xl font-extrabold text-amber-900 mb-2">
          어떤 책을 찾고 있나요? 🧐
        </h2>
        <p class="text-amber-700">키워드, 제목, 저자로 자유롭게 검색해보세요!</p>
      </div>

      <form id="searchForm" class="max-w-3xl mx-auto flex flex-col md:flex-row gap-3">
        <div class="relative group flex-shrink-0">
          <select 
            id="searchType"
            class="w-full md:w-36 h-14 pl-4 pr-10 rounded-2xl border-none font-bold text-amber-900 bg-white shadow-md focus:ring-4 focus:ring-amber-300 appearance-none cursor-pointer active:scale-95 transition-transform outline-none"
          >
            <option value="Keyword">💡 키워드</option>
            <option value="Title">📖 도서명</option>
            <option value="Author">✍️ 저자명</option>
          </select>
          <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-amber-500">▼</div>
        </div>
        
        <div class="flex-1 relative">
          <input 
            type="text" 
            id="searchInput"
            placeholder="검색어를 입력하세요 (예: 해리포터)"
            class="w-full h-14 pl-6 pr-16 rounded-2xl border-none shadow-md focus:ring-4 focus:ring-amber-300 text-lg transition-shadow outline-none"
            required
          />
          <button 
            type="submit"
            class="absolute right-2 top-2 bottom-2 aspect-square bg-amber-500 hover:bg-amber-600 text-white rounded-xl shadow flex items-center justify-center active:scale-90 transition-all text-xl"
          >
            🔍
          </button>
        </div>
      </form>
    </section>

    <!-- 피넛 로딩창 -->
    <div id="loader" class="hidden flex-col items-center justify-center py-20 space-y-4">
      <div class="text-7xl animate-bounce drop-shadow-xl">🥜</div>
      <div class="text-xl font-extrabold text-amber-700 animate-pulse bg-white/70 px-6 py-2 rounded-full shadow-sm">
        열심히 책을 찾고 있어요! 쫄깃쫄깃...✨
      </div>
    </div>

    <!-- 베스트셀러 섹션 -->
    <section id="bestseller-section">
      <div class="flex items-center gap-2 mb-6">
        <span class="text-2xl">🔥</span>
        <h2 class="text-2xl font-extrabold text-gray-800">이번 주 베스트셀러</h2>
      </div>
      <div id="bestseller-container" class="flex overflow-x-auto pb-8 -mx-4 px-4 gap-4 snap-x snap-mandatory hide-scrollbar">
        <!-- 자바스크립트로 렌더링 됩니다 -->
      </div>
    </section>

    <!-- 검색 결과 섹션 -->
    <div id="search-result-wrapper" class="hidden space-y-12">
      
      <!-- 완전 일치 도서 -->
      <section id="exact-section" class="hidden">
        <div class="flex items-center gap-2 mb-6 border-b-2 border-amber-200 pb-3">
          <span class="text-2xl">🎯</span>
          <h2 class="text-2xl font-extrabold text-gray-800">
            <span id="exact-keyword" class="text-amber-600"></span> 완전 일치 도서
          </h2>
        </div>
        <div id="exact-container" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6"></div>
      </section>

      <!-- 관련 도서 -->
      <section id="related-section" class="hidden">
        <div class="flex items-center gap-2 mb-6 border-b-2 border-gray-200 pb-3">
          <span class="text-2xl">🌿</span>
          <h2 class="text-2xl font-extrabold text-gray-800">이런 책은 어때요? (관련 도서)</h2>
        </div>
        <div id="related-container" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6"></div>
      </section>

      <!-- 검색 결과 없음 -->
      <div id="no-result" class="hidden text-center py-20">
        <div class="text-6xl mb-4">🥲</div>
        <h3 class="text-xl font-bold text-gray-500">앗! 해당하는 책을 찾지 못했어요.</h3>
        <p class="text-gray-400 mt-2">다른 검색어로 다시 시도해 볼까요?</p>
      </div>
    </div>

  </main>

  <!-- 도서 상세 모달 팝업 -->
  <div id="book-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeModal()"></div>
    
    <div class="relative bg-white w-full max-w-3xl rounded-[2rem] shadow-2xl flex flex-col md:flex-row overflow-hidden animate-zoom-in">
      <button onclick="closeModal()" class="absolute top-4 right-4 z-10 w-10 h-10 bg-gray-100 hover:bg-red-100 hover:text-red-600 rounded-full flex items-center justify-center font-bold text-gray-500 transition-colors active:scale-90">✕</button>

      <!-- 왼쪽 북커버 영역 -->
      <div class="w-full md:w-2/5 bg-amber-50 p-8 flex items-center justify-center relative">
         <div class="absolute top-0 left-0 w-full h-32 bg-gradient-to-b from-amber-100/50 to-transparent"></div>
         <img id="modal-cover" src="" class="w-full max-w-[200px] md:max-w-none rounded-xl shadow-[10px_10px_30px_rgba(0,0,0,0.15)] relative z-10" />
      </div>

      <!-- 오른쪽 정보 영역 -->
      <div class="w-full md:w-3/5 p-6 md:p-8 flex flex-col max-h-[80vh] overflow-y-auto">
        <div id="modal-categories" class="flex flex-wrap gap-2 mb-4"></div>
        <h2 id="modal-title" class="text-2xl md:text-3xl font-extrabold text-gray-900 mb-2 leading-tight"></h2>
        <p id="modal-author" class="text-lg text-gray-600 font-medium mb-6 flex items-center gap-2"></p>

        <div class="bg-gray-50 rounded-2xl p-5 mb-6 border border-gray-100 flex-1">
          <h3 class="font-bold text-gray-800 mb-3 flex items-center gap-2">
            <span>📖</span> 줄거리 요약
          </h3>
          <p id="modal-desc" class="text-gray-600 text-sm md:text-base leading-relaxed"></p>
        </div>

        <div class="mt-auto pt-4 flex gap-3">
          <a id="modal-link" href="#" target="_blank" class="flex-1 bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 px-6 rounded-xl text-center active:scale-95 transition-all shadow-md shadow-amber-500/30">
            알라딘에서 자세히 보기 🚀
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ----------------------------------------------------
    // API 설정 및 전역 변수
    // (정적 HTML 파일 배포이므로 API 키를 스크립트에 포함합니다)
    // ----------------------------------------------------
    const API_KEY = "ttbspace.c.chani.i1640001";
    let currentBooks = {}; // 모달에 띄울 도서 데이터 캐싱용

    // ----------------------------------------------------
    // 알라딘 API 호출 함수 (프록시 사용)
    // ----------------------------------------------------
    async function fetchAladin(endpoint, params) {
      const url = new URL(`https://www.aladin.co.kr/ttb/api/${endpoint}`);
      url.searchParams.append('ttbkey', API_KEY);
      url.searchParams.append('output', 'js');
      url.searchParams.append('Version', '20131101');
      url.searchParams.append('Cover', 'Big');
      Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));

      // 정적 호스팅에서 발생하는 CORS 문제를 우회하기 위한 프록시 서비스
      const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url.toString())}`;
      
      try {
        const res = await fetch(proxyUrl);
        const data = await res.json();
        return JSON.parse(data.contents);
      } catch (error) {
        console.error("API 호출 에러:", error);
        return { item: [] };
      }
    }

    // 카테고리 파싱 (빈출 3개)
    function formatCategory(categoryString) {
      if (!categoryString) return ["분류 정보 없음"];
      const parts = categoryString.split('>').map(p => p.trim()).filter(Boolean);
      return parts.slice(Math.max(parts.length - 3, 0));
    }

    // 카드 공통 HTML 생성 함수
    function createCardHTML(book) {
      currentBooks[book.itemId] = book; // 데이터 저장
      const authorName = book.author ? book.author.split('(')[0] : '저자 미상';
      return `
        <div onclick="openModal('${book.itemId}')" class="group relative flex flex-col bg-white rounded-3xl p-4 shadow-[0_8px_30px_rgb(0,0,0,0.08)] book-card cursor-pointer border border-amber-100 h-full w-full">
          <div class="w-full aspect-[2/3] rounded-2xl overflow-hidden mb-4 relative bg-amber-50 shadow-inner">
            <img src="${book.cover}" alt="${book.title}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" onerror="this.src='https://via.placeholder.com/200x300?text=No+Cover'" />
            <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
          </div>
          <h3 class="font-bold text-gray-800 line-clamp-2 leading-tight mb-1 text-sm md:text-base group-hover:text-amber-600 transition-colors">${book.title}</h3>
          <p class="text-xs text-gray-500 line-clamp-1 mt-auto">${authorName}</p>
        </div>
      `;
    }

    // ----------------------------------------------------
    // 초기 실행 및 화면 제어
    // ----------------------------------------------------
    async function initApp() {
      showLoader();
      const data = await fetchAladin('ItemList.aspx', {
        QueryType: 'Bestseller',
        MaxResults: 15,
        start: 1,
        SearchTarget: 'Book'
      });
      
      if (data && data.item) {
        let html = '';
        data.item.forEach((book, idx) => {
          html += `
            <div class="snap-center shrink-0 w-40 md:w-48 first:ml-0 relative">
              <div class="absolute -top-3 -left-3 w-10 h-10 bg-amber-500 text-white font-black rounded-full flex items-center justify-center z-10 shadow-lg border-2 border-white">${idx + 1}</div>
              ${createCardHTML(book)}
            </div>
          `;
        });
        document.getElementById('bestseller-container').innerHTML = html;
      }
      hideLoader();
    }

    // 검색 폼 서밋 이벤트
    document.getElementById('searchForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const keyword = document.getElementById('searchInput').value.trim();
      const searchType = document.getElementById('searchType').value;
      if (!keyword) return;

      showLoader();
      
      const data = await fetchAladin('ItemSearch.aspx', {
        Query: keyword,
        QueryType: searchType,
        MaxResults: 30,
        start: 1,
        SearchTarget: 'Book'
      });

      document.getElementById('bestseller-section').classList.add('hidden');
      document.getElementById('search-result-wrapper').classList.remove('hidden');
      
      const exactSection = document.getElementById('exact-section');
      const relatedSection = document.getElementById('related-section');
      const noResultDiv = document.getElementById('no-result');
      
      exactSection.classList.add('hidden');
      relatedSection.classList.add('hidden');
      noResultDiv.classList.add('hidden');

      if (data && data.item && data.item.length > 0) {
        let exactHtml = '';
        let relatedHtml = '';
        let exactCount = 0;
        let relatedCount = 0;

        const keywordLower = keyword.toLowerCase();

        data.item.forEach(book => {
          if (book.title.toLowerCase().includes(keywordLower)) {
            exactHtml += createCardHTML(book);
            exactCount++;
          } else {
            relatedHtml += createCardHTML(book);
            relatedCount++;
          }
        });

        if (exactCount > 0) {
          document.getElementById('exact-keyword').innerText = `'${keyword}'`;
          document.getElementById('exact-container').innerHTML = exactHtml;
          exactSection.classList.remove('hidden');
        }
        if (relatedCount > 0) {
          document.getElementById('related-container').innerHTML = relatedHtml;
          relatedSection.classList.remove('hidden');
        }
      } else {
        noResultDiv.classList.remove('hidden');
      }
      
      hideLoader();
    });

    // ----------------------------------------------------
    // 모달 및 UI 유틸리티
    // ----------------------------------------------------
    function openModal(itemId) {
      const book = currentBooks[itemId];
      if (!book) return;

      // 카테고리 태그 세팅
      const categories = formatCategory(book.categoryName);
      const tagsHtml = categories.map(cat => 
        `<span class="inline-flex items-center px-3 py-1 bg-amber-100 text-amber-800 text-xs font-bold rounded-full border border-amber-200">
          <span class="mr-1 opacity-60">•</span> ${cat}
        </span>`
      ).join('');

      document.getElementById('modal-categories').innerHTML = tagsHtml;
      document.getElementById('modal-cover').src = book.cover;
      document.getElementById('modal-title').innerText = book.title;
      document.getElementById('modal-author').innerText = `✍️ ${book.author}`;
      document.getElementById('modal-desc').innerText = book.description || "제공된 줄거리 요약이 없습니다. 🥲 직접 책을 읽어보고 확인해보는 건 어떨까요?";
      document.getElementById('modal-link').href = book.link;

      const modal = document.getElementById('book-modal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function closeModal() {
      const modal = document.getElementById('book-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    function showLoader() {
      document.getElementById('loader').classList.remove('hidden');
      document.getElementById('loader').classList.add('flex');
      document.getElementById('bestseller-section').classList.add('hidden');
      document.getElementById('search-result-wrapper').classList.add('hidden');
    }

    function hideLoader() {
      document.getElementById('loader').classList.add('hidden');
      document.getElementById('loader').classList.remove('flex');
    }

    function goHome() {
      document.getElementById('searchInput').value = '';
      document.getElementById('search-result-wrapper').classList.add('hidden');
      document.getElementById('bestseller-section').classList.remove('hidden');
    }
  </script>
</body>
</html>
